name: Scanner
on:
  push:
    branches:
      - master
    paths:
      - tools/scanner/**
  pull_request:
    paths:
      - tools/scanner/**

permissions: {}

defaults:
  run:
    shell: bash
    working-directory: tools/scanner

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/scanner/go.mod
          cache-dependency-path: tools/scanner/go.sum

      - run: make test-unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/scanner/go.mod
          cache-dependency-path: tools/scanner/go.sum

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/infracost/plugins
          key: ${{ runner.os }}-scanner-plugins

      - run: make test-integration
        env:
          INFRACOST_CLI_AUTHENTICATION_TOKEN: ${{ secrets.INFRACOST_CLI_AUTHENTICATION_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/scanner/go.mod
          cache-dependency-path: tools/scanner/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.10
          working-directory: tools/scanner

  mocks:
    name: Mocks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/scanner/go.mod
          cache-dependency-path: tools/scanner/go.sum

      - run: make mocks

      - name: Check for changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "Mock files are out of date. Please run 'make mocks' and commit the changes."
            git diff --name-only
            exit 1
          fi