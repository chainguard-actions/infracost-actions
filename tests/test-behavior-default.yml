name: Test behavior input default value
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/pull/1/merge
      GITHUB_EVENT_NAME: pull_request
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify behavior input has correct default
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          echo "Checking behavior default in: $ACTION_FILE"

          # Check that behavior input exists
          if ! grep -q "behavior:" "$ACTION_FILE"; then
            echo "FAIL: behavior input not found in action.yml"
            exit 1
          fi
          echo "PASS: behavior input found"

          # Check that default is 'update'
          if ! grep -q "default: update" "$ACTION_FILE"; then
            echo "FAIL: behavior default is not 'update'"
            exit 1
          fi
          echo "PASS: behavior default is 'update'"

      - name: Verify all valid behavior values are documented
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"

          # Check that the action documents valid behavior values
          for behavior in "update" "delete-and-new" "hide-and-new" "new"; do
            if ! grep -q "$behavior" "$ACTION_FILE"; then
              echo "FAIL: behavior value '$behavior' not mentioned in action.yml"
              exit 1
            fi
            echo "PASS: behavior value '$behavior' is documented"
          done

      - name: Verify behavior is not required (has default)
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"

          # The behavior input should not be marked as required: true
          # Extract the behavior section and check it doesn't have required: true
          BEHAVIOR_SECTION=$(awk '/^  behavior:/,/^  [a-z]/' "$ACTION_FILE" | head -20)
          echo "Behavior section:"
          echo "$BEHAVIOR_SECTION"

          if echo "$BEHAVIOR_SECTION" | grep -q "required: true"; then
            echo "FAIL: behavior input is marked as required but should have a default"
            exit 1
          fi
          echo "PASS: behavior input is not required (has default value)"

      # Invoke the action under test (required by lint); it will fail without
      # real credentials, so we allow failure and only assert on structure above.
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: dummy-key-for-behavior-test
          path: .
          behavior: update
