name: Test action structure and steps
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/pull/1/merge
      GITHUB_EVENT_NAME: pull_request
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify action has checkout base branch step
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "Checkout base branch" "$ACTION_FILE"; then
            echo "FAIL: action does not have 'Checkout base branch' step"
            exit 1
          fi
          echo "PASS: action has 'Checkout base branch' step"

      - name: Verify action has Setup Infracost step
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "Setup Infracost" "$ACTION_FILE"; then
            echo "FAIL: action does not have 'Setup Infracost' step"
            exit 1
          fi
          echo "PASS: action has 'Setup Infracost' step"

      - name: Verify action uses infracost setup action
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "infracost/actions/setup" "$ACTION_FILE"; then
            echo "FAIL: action does not use infracost/actions/setup"
            exit 1
          fi
          echo "PASS: action uses infracost/actions/setup"

      - name: Verify action generates cost estimate baseline
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "Generate Infracost cost estimate baseline" "$ACTION_FILE"; then
            echo "FAIL: action does not have baseline generation step"
            exit 1
          fi
          if ! grep -q "infracost breakdown" "$ACTION_FILE"; then
            echo "FAIL: action does not run 'infracost breakdown'"
            exit 1
          fi
          echo "PASS: action generates cost estimate baseline"

      - name: Verify action posts PR comment
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "Post Infracost comment" "$ACTION_FILE"; then
            echo "FAIL: action does not have 'Post Infracost comment' step"
            exit 1
          fi
          if ! grep -q "infracost comment github" "$ACTION_FILE"; then
            echo "FAIL: action does not run 'infracost comment github'"
            exit 1
          fi
          echo "PASS: action posts PR comment"

      - name: Verify action passes behavior to infracost comment
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "inputs.behavior" "$ACTION_FILE"; then
            echo "FAIL: action does not pass behavior input to infracost comment"
            exit 1
          fi
          echo "PASS: action passes behavior input to infracost comment"

      - name: Verify action passes api-key to setup
        run: |
          ACTION_FILE="$GITHUB_WORKSPACE/action.yml"
          if ! grep -q "inputs.api_key" "$ACTION_FILE"; then
            echo "FAIL: action does not pass api-key to setup step"
            exit 1
          fi
          echo "PASS: action passes api-key to setup step"

      # Invoke the action under test (required by lint); it will fail without
      # real credentials, so we allow failure and only assert on structure above.
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: dummy-key-for-structure-test
          path: .
          behavior: update
