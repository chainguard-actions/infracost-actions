name: Test delete-and-new behavior input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/pull/1/merge
      GITHUB_EVENT_NAME: pull_request
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Test that the action accepts 'delete-and-new' as a valid behavior value
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: invalid-api-key-for-testing
          path: .
          behavior: delete-and-new

      - name: Assert action was invoked with delete-and-new behavior
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because of invalid API key / missing Infracost CLI,
          # not because of an invalid 'behavior' input value.
          # Any outcome other than 'skipped' means the action was invoked correctly.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — 'delete-and-new' behavior may not have been accepted"
            exit 1
          fi
          echo "PASS: action was invoked with delete-and-new behavior (outcome=$OUTCOME)"
